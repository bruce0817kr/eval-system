services:
  web:
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://eval:eval_secret@postgres:5432/eval_db
      AUTH_SECRET: platform-local-auth-secret-change-me
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: eval-documents
      S3_REGION: us-east-1
      INTEGRATION_API_KEY: test-integration-key
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    restart: unless-stopped

  biz-api:
    build:
      context: ../apps/biz-api
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://eval:eval_secret@postgres:5432/eval_db
      SECRET_KEY: platform-local-biz-secret-change-me
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      SUPPORT_CASE_REPOSITORY_MODE: db
      ADMIN_LOGIN_ID: admin
      ADMIN_ROLE: ADMIN
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  proxy:
    image: nginx:1.27-alpine
    ports:
      - "3003:80"
    volumes:
      - ./proxy/platform.nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      web:
        condition: service_started
      biz-api:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: eval
      POSTGRES_PASSWORD: eval_secret
      POSTGRES_DB: eval_db
    volumes:
      - platform_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eval -d eval_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - platform_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - platform_minio_data:/data
    restart: unless-stopped

volumes:
  platform_postgres_data:
  platform_redis_data:
  platform_minio_data:
